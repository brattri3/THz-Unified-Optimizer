<li data-marpit-fragment="1"><strong>Комплексная аппроксимация:</strong> Впервые оптимизация ведётся по амплитуде <strong>и</strong> фазе одновременно<br />
<em>(см. Castro-Camus, J. Infrared Millim. Terahertz Waves, 2012)</em>.</li>
<li data-marpit-fragment="2"><strong>Явление:</strong> При углах 80°–90° экспериментальная фаза резко расходилась с моделью.</li>

  <div>
